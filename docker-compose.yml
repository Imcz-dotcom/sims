services:
  mongodb:
    image: mongo:7
    container_name: sims-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sims

  backend:
    build: ./backend
    container_name: sims-backend
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/sims
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5001/api/inventory"
    container_name: sims-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend

volumes:
  mongodb-data:
