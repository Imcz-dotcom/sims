
services:
  mongodb:
    image: mongo:7
    container_name: sims-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sims

  backend:
    build: ./backend
    container_name: sims-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/sims
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: sims-frontend
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend-node_modules:/app/node_modules
      - frontend-next:/app/.next

volumes:
  mongodb-data:
  frontend-node_modules:
  frontend-next:
